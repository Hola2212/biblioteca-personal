<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Biblioteca Pro 3.0</title>
<style>
body{font-family:system-ui;margin:0;background:#0f172a;color:white}
header{background:#1e293b;padding:16px;position:sticky;top:0}
.container{max-width:1200px;margin:auto;padding:16px}
.card{background:#1e293b;padding:12px;border-radius:12px;margin:10px 0}
input,select,button{padding:10px;border-radius:8px;border:none;margin:4px}
input{width:min(700px,95%)}
dialog{max-width:600px;width:95%}
</style>
</head>
<body>
<header>
<h1>📚 Biblioteca Pro 3.0</h1>
<input id="q" placeholder="Buscar...">
<button onclick="random20()">🎲 Otros 20</button>
<button onclick="random1()">📖 Libro al azar</button>
<button onclick="loadData(true)">🔄 Actualizar</button>
<button onclick="dlg.showModal()">➕ Agregar libro</button>
<div id="stats"></div>
</header>

<div class="container"><div id="results"></div></div>

<dialog id="dlg">
<h3>Agregar libro</h3>
<input id="titulo" placeholder="Título"><br>
<input id="autor" placeholder="Autor"><br>
<input id="idioma" placeholder="Idioma"><br>
<input id="ubicacion" placeholder="Ubicación"><br>

<select id="disp">
<option value="1">📚 Disponible</option>
<option value="0">❌ No disponible</option>
</select>

<select id="estado">
<option value="0">⬜ No leído</option>
<option value="3">👀 Leyendo</option>
<option value="2">📖 A la mitad</option>
<option value="1">✅ Leído</option>
</select>

<br>
<button onclick="guardarLibro()">Guardar</button>
<button onclick="dlg.close()">Cancelar</button>
<div id="msg"></div>
</dialog>

<script>
const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQdFRgQevR6pbicFy0195rMlaE6LcXLJayx82dBBRIi-5dL81Y9V6MFHdXk-Vff_w/pub?gid=1729985933&single=true&output=csv";
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbzXciLPfrUb0h_W85NrkUMrqLUj8bYNYrSJ7V8IHme8C-KENnGzG6Smoh7wHaZSPPmEUg/exec";
let books=[];

async function loadData(force=false){
 const cache=localStorage.getItem("biblioteca_cache");
 if(cache && !force){
   books=JSON.parse(cache);
   random20();
 }
 try{
   const txt=await fetch(CSV_URL).then(r=>r.text());
   const lines=txt.trim().split(/\r?\n/);
   const headers=lines[0].split(",");
   books=lines.slice(1).map(line=>{
      const cols=line.split(",");
      const o={};
      headers.forEach((h,i)=>o[h]=cols[i]||"");
      return o;
   });
   localStorage.setItem("biblioteca_cache",JSON.stringify(books));
   random20();
 }catch(e){}
}

function render(list){
 stats.innerHTML=`Total: ${books.length} | Mostrando: ${list.length}`;
 results.innerHTML=list.map(b=>'<div class="card">'+Object.entries(b).map(([k,v])=>v?'<div><b>'+k+':</b> '+v+'</div>':'').join('')+'</div>').join('');
}
function shuffle(a){return [...a].sort(()=>Math.random()-0.5)}
function random20(){render(shuffle(books).slice(0,20))}
function random1(){render([books[Math.floor(Math.random()*books.length)]])}

q.oninput=()=>{
 const t=q.value.toLowerCase();
 if(!t) return random20();
 render(books.filter(b=>Object.values(b).some(v=>String(v).toLowerCase().includes(t))));
}

async function guardarLibro(){
 const data={
  titulo: titulo.value,
  autor: autor.value,
  idioma: idioma.value,
  ubicacion: ubicacion.value,
  disponibilidad: disp.value,
  estadoLectura: estado.value
 };
 try{
  await fetch(SCRIPT_URL, {
   method:"POST",
   body:JSON.stringify(data)
  });
  msg.innerText="✅ Libro enviado.";
 }catch(e){
  msg.innerText="❌ Error al enviar.";
 }
}

loadData();
</script>
</body>
</html>
